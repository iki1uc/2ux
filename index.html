<div class="block">
  <h3>Navigation (81‑Raum)</h3>
  <input id="home" placeholder="home (0–80)">
  <input id="target" placeholder="target (0–80)" style="margin-top:5px;">
  <textarea id="navOut" rows="4" readonly></textarea>
</div>

<script>
function nav81(home, target) {
  const h = parseInt(home, 10);
  const t = parseInt(target, 10);
  if (isNaN(h) || isNaN(t)) return "invalid";

  const diff = (t - h + 81) % 81; // 81-Raum
  const row = Math.floor(h / 9);  // 0–8
  const col = h % 9;              // 0–8

  return `home=${h}, target=${t}
diff81=${diff}
row=${row}
col=${col}`;
}

function updateNav() {
  const h = document.getElementById("home").value;
  const t = document.getElementById("target").value;
  document.getElementById("navOut").value = nav81(h, t);
}

document.getElementById("home").addEventListener("input", updateNav);
document.getElementById("target").addEventListener("input", updateNav);
</script>
