<div class="block">
  <h3>EVO‑LIVE (12‑CUBE)</h3>
  <input id="cubeId" placeholder="Cube‑ID eingeben…">
  <textarea id="cubeOut" rows="8" readonly></textarea>
</div>

<script>
const EVO_CUBES = Array.from({ length: 12 }, (_, i) => ({
  id: "EVO" + (i+1),
  info: {},
  evo: 0,
  eich: 0,
  gen: 0,
  fix3: [0,0,0],
  µ: 1,
  q: 0,
  y: 0,
  home: {
    active: null,
    pool6: [],
    pool12: [],
    pool24: [],
    pool48: []
  }
}));

function techLive(cube, info) {
  cube.info = info;
  cube.evo++;
  cube.fix3 = cube.fix3.map(v => v + 1);
  cube.q += 0.1;
  cube.y += 0.1;
  cube.µ *= 1.01;
}

function updateCube() {
  const id = document.getElementById("cubeId").value;
  const cube = EVO_CUBES.find(c => c.id === id);
  if (!cube) return;

  techLive(cube, { time: Date.now() });

  document.getElementById("cubeOut").value =
    JSON.stringify(cube, null, 2);
}

document.getElementById("cubeId").addEventListener("input", updateCube);
</script>
